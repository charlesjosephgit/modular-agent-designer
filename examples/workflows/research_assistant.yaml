name: research_assistant
description: Three-stage research workflow — Ollama researcher, analyst, and writer.

models:
  local_fast:
    provider: ollama
    model: ollama/gemma4:e4b

agents:
  researcher:
    model: local_fast
    instruction_file: prompts.research_assistant__researcher

  analyst:
    model: local_fast
    instruction_file: prompts.research_assistant__analyst

  writer:
    model: local_fast
    instruction_file: prompts.research_assistant__writer

workflow:
  nodes:
    - researcher
    - analyst
    - writer
  edges:
    - from: researcher
      to: analyst
    - from: analyst
      to: writer
  entry: researcher
