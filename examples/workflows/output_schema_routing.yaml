name: output_schema_routing
description: >
  Demonstrates routing based on a structured Pydantic output_schema.
  The validator agent returns a ValidationResult with validation_result == "success" or "fail".
  The router then branches: success → process_node, anything else → reject_node (default).

models:
  fast:
    provider: ollama
    model: "ollama_chat/gemma4:e4b"

agents:
  validator:
    model: fast
    output_schema: "examples.schemas.validation.ValidationResult"
    instruction_file: examples.prompts.output_schema_routing__validator

  process_node:
    model: fast
    instruction_file: examples.prompts.output_schema_routing__process_node

  reject_node:
    model: fast
    instruction_file: examples.prompts.output_schema_routing__reject_node

workflow:
  entry: validator
  nodes:
    - validator
    - process_node
    - reject_node
  edges:
    # Route to process_node when validation_result == "success".
    # state['validator'] is the dict ADK writes from the output_schema.
    - from: validator
      to: process_node
      condition:
        eval: "state.get('validator', {}).get('validation_result') == 'success'"

    # Default fallback — catches "fail" and any unexpected values.
    - from: validator
      to: reject_node
      condition: default
