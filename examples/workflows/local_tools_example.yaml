# Example: referencing a custom tool from the repository's examples/tools directory.
#
# The `examples/tools/` package lives OUTSIDE the modular_agent_designer package —
# no changes to the framework are needed and no pip install is required.
#
# Layout expected when running from the project root:
#
#   examples/tools/
#     __init__.py          (empty)
#     text_tools.py        (contains word_count, extract_keywords, summarize_stats)
#   examples/workflows/
#     local_tools_example.yaml   (this file)
#
# How it works:
#   `modular-agent-designer` automatically adds the CWD and the YAML's
#   directory to sys.path at startup, so `examples.tools.text_tools` is importable
#   as long as you run the CLI from the project root.
#
# Run:
#   uv run modular-agent-designer run \
#     examples/workflows/local_tools_example.yaml \
#     --input '{"text": "The quick brown fox jumps over the lazy dog. AI agents are transforming how we build software pipelines."}'

name: local_tools_demo
description: >
  Demonstrates referencing custom tool callables from examples/tools —
  no pip install required.

models:
  local:
    provider: ollama
    model: ollama_chat/gemma4:e4b

tools:
  word_count:
    type: python
    ref: examples.tools.text_tools.word_count

  extract_keywords:
    type: python
    ref: examples.tools.text_tools.extract_keywords

  summarize_stats:
    type: python
    ref: examples.tools.text_tools.summarize_stats

agents:
  text_analyst:
    model: local
    instruction_file: examples.prompts.local_tools_example__text_analyst
    tools: [word_count, extract_keywords, summarize_stats]

workflow:
  nodes: [text_analyst]
  edges: []
  entry: text_analyst
