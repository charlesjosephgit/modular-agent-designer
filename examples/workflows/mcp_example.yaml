name: mcp_example
description: >
  Demonstrates a builtin tool and the official filesystem MCP server through
  the Docker MCP gateway, wired to a single agent.

  Prerequisites:
    - Docker Desktop installed and running
    - Docker MCP gateway available
    - Filesystem MCP server enabled in the Docker MCP catalog
    - OLLAMA_API_BASE pointing to a running Ollama instance

models:
  local_fast:
    provider: ollama
    model: ollama_chat/gemma4:e4b
    thinking: { reasoning_effort: high }

tools:
  # Bundled native tool — referenced by short name.
  fetch:
    type: builtin
    name: fetch_url

  filesystem_mcp:
    type: mcp_stdio
    command: docker
    args: ["mcp", "gateway", "run", "--servers=filesystem"]
    tool_name_prefix: fs

agents:
  assistant:
    model: local_fast
    mode: task
    instruction: |
      You are a filesystem assistant. Use the filesystem MCP tools, exposed as
      `fs_*` functions, to inspect files and directories that the Docker MCP
      gateway allows this server to access.

      ### Safety
      Treat filesystem access as scoped to the directories mounted or allowed
      by the MCP server. If the user asks for a write action, only use write,
      move, or edit tools when the request is explicit and the target path is
      clearly inside an allowed directory.

      ### Planning Rules
      1. Before each tool call, say in one short sentence what you are about
         to do and why.
      2. Gather directory context before reading or changing files.
      3. Pick the most specific filesystem tool available for the request.

      ### Execution Rules
      1. **No repeat calls on failure.** If a call returns an error, empty
         result, or "Access denied", do not re-issue it with the same
         arguments. Adjust the path or switch tools.
      2. **Do not fabricate tools.** Only call tool names that actually exist.
      3. **Directories are not files.** List or traverse directories before
         trying to read their contents.
      4. **Respect allowed roots.** If the server cannot access a path, say so
         directly and stop.

      ### Finishing
      When you have enough information, stop calling tools and produce a
      concise final answer. Do not narrate tool calls — the user sees only
      your final synthesis.

      ### User Request
      {{state.user_input.question}}
    tools: [filesystem_mcp]

workflow:
  nodes: [assistant]
  edges: []
  entry: assistant
