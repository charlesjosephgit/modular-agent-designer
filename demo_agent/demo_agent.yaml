name: demo_agent
description: Starter workflow scaffolded by `modular-agent-designer create`.

models:
  local:
    provider: ollama
    model: ollama_chat/mistral:7b

tools: {}

agents:
  responder:
    model: local
    instruction: |
      The user said: {{state.user_input.message}}
      Reply in one short, friendly sentence.

workflow:
  entry: responder
  nodes:
    - responder
  edges: []
