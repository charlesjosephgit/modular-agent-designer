name: sub_agent_research
description: |
  Coordinator/specialist pattern using sub-agents.
  The coordinator delegates search and analysis to specialist sub-agents at runtime.
  Sub-agents are invoked by the coordinator's LLM — not by workflow edges.

models:
  local_fast:
    provider: ollama
    model: ollama_chat/gemma4:e4b
    thinking: { reasoning_effort: high }

agents:
  # Specialist sub-agents — NOT in workflow.nodes.
  # mode: single_turn wraps each as a callable tool the coordinator can invoke.
  search_specialist:
    model: local_fast
    instruction_file: prompts.sub_agent_example__search_specialist
    mode: single_turn

  analysis_specialist:
    model: local_fast
    instruction_file: prompts.sub_agent_example__analysis_specialist
    mode: single_turn

  # Coordinator is the only workflow node.
  # It decides at runtime which specialists to invoke.
  coordinator:
    model: local_fast
    mode: task
    instruction_file: prompts.sub_agent_example__coordinator
    sub_agents:
      - search_specialist
      - analysis_specialist

workflow:
  nodes: [coordinator]
  edges: []
  entry: coordinator
