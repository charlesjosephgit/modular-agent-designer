# Example: using skills with agents.
#
# Skills are defined in a root-level `skills:` section with dotted refs
# pointing to Python functions that return list[Skill].
# Agents reference skills by alias name.
#
# Run:
#   uv run modular-agent-designer run \
#     workflows/skills_example.yaml --input '{"topic": "climate change"}'
#
# This example uses:
#   - A built-in skill from the framework (summarizer)
#   - A local skill from the project's skills/ folder (local_summary)
#
# The SkillToolset provides progressive disclosure:
#   L1: Agent sees skill name + description at startup
#   L2: Full instructions loaded only when the agent decides to use the skill
#   L3: Resources (references, assets, scripts) loaded on demand

name: skills_demo
description: Demonstrates skills support with agents.

models:
  local:
    provider: ollama
    model: ollama_chat/gemma4:e4b

skills:
  summarizer:
    ref: modular_agent_designer.skills.summarize-text
  local_summary:
    ref: skills.summarize-text

tools: {}

agents:
  researcher:
    model: local
    mode: task
    instruction_file: prompts.skills_example__researcher
    skills: [summarizer]

workflow:
  nodes: [researcher]
  edges: []
  entry: researcher
