name: summarize_article
description: Summarizes an article into a structured ArticleSummary schema.

models:
  local_fast:
    provider: ollama
    model: ollama_chat/gemma4:e4b

tools: {}

agents:
  summarizer:
    model: local_fast
    output_schema: schemas.article.ArticleSummary
    instruction_file: prompts.summarize_article__summarizer

  recommender:
    model: local_fast
    mode: single_turn
    include_contents: none
    instruction_file: prompts.summarize_article__recommender

workflow:
  nodes:
    - summarizer
    - recommender
  edges:
    - from: summarizer
      to: recommender
  entry: summarizer
